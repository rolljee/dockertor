name: Release

on:
  push:
    branches: [main, develop]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # push release commit + tags, create GitHub releases
  issues: write # comment on released issues
  pull-requests: write # comment on released PRs

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.published }}
      version: ${{ steps.semantic.outputs.version }}
      channel: ${{ steps.semantic.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install release tooling
        run: npm ci
      - name: Run semantic-release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Publish image (${{ matrix.name }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: ./api
            file: ./api/Dockerfile
          - name: web
            context: ./web
            file: ./web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dockertor-${{ matrix.name }}"
          VERSION="${{ needs.release.outputs.version }}"
          CHANNEL="${{ needs.release.outputs.channel }}"
          MOVING="${CHANNEL:-latest}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:${MOVING}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
