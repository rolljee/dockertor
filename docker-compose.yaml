services:
  api:
    build:
      context: ./api/docker/bun
      dockerfile: Dockerfile
    command: sh /app/start.sh
    container_name: api
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    image: node:22-alpine
    container_name: web
    command: sh /app/start.sh
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
